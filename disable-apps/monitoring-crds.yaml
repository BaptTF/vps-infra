# apps/monitoring-crds.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring-crds
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"  # Syncs before monitoring app
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 56.2.0
    helm:
      # Install ONLY the CRDs, no other resources
      skipCrds: false
      values: |
        prometheusOperator:
          enabled: false
        prometheus:
          enabled: false
        alertmanager:
          enabled: false
        grafana:
          enabled: false
        kubeStateMetrics:
          enabled: false
        nodeExporter:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: false  # Never prune CRDs automatically — dangerous
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=true