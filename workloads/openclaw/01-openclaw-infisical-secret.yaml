# OpenCLAW and LiteLLM secrets from Infisical
# Configure in Infisical:
#   - project: openclaw
#   - environment: production
#   - secret path: /app
#   - keys: (all env variables from .env for openclaw)
#   - secret path: /litellm
#   - keys: aws-access-key-id, aws-secret-access-key, master-key

apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: openclaw-secrets
  namespace: default
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  hostAPI: https://app.infisical.com/api
  authentication:
    universalAuth:
      secretsScope:
        projectSlug: openclaw
        envSlug: prod
        secretsPath: /app
      credentialsRef:
        secretName: infisical-universal-auth
        secretNamespace: infisical
  managedKubeSecretReferences:
    - secretName: openclaw-secrets
      secretNamespace: default
      secretType: Opaque
      creationPolicy: Owner
---
apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: litellm-secrets
  namespace: default
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  hostAPI: https://app.infisical.com/api
  authentication:
    universalAuth:
      secretsScope:
        projectSlug: openclaw
        envSlug: prod
        secretsPath: /litellm
      credentialsRef:
        secretName: infisical-universal-auth
        secretNamespace: infisical
  managedKubeSecretReferences:
    - secretName: litellm-secrets
      secretNamespace: default
      secretType: Opaque
      creationPolicy: Owner
