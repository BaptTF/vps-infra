apiVersion: apps/v1
kind: Deployment
metadata:
  name: bifrost
  labels:
    app: bifrost
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bifrost
  template:
    metadata:
      labels:
        app: bifrost
    spec:
      containers:
        - name: bifrost
          image: maximhq/bifrost:latest
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          args:
            - "-app-dir"
            - "/app/data"
            - "-port"
            - "4000"
          ports:
            - containerPort: 4000
          envFrom:
            - secretRef:
                name: bifrost-secret
          volumeMounts:
            - name: config-volume
              mountPath: /app/data/config.json
              subPath: config.json
      volumes:
        - name: config-volume
          configMap:
            name: bifrost-config
