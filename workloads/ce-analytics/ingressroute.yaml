apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: ce-analytics
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`ce-analytics.bapttf.com`)
      kind: Rule
      middlewares:
        - name: forwardauth-authelia
          namespace: authelia
      services:
        - name: ce-app
          port: 3000
  tls: {}
