apiVersion: apps/v1
kind: Deployment
metadata:
  name: ce-app
  labels:
    app: ce-app
spec:
  revisionHistoryLimit: 2
  replicas: 1
  selector:
    matchLabels:
      app: ce-app
  template:
    metadata:
      labels:
        app: ce-app
    spec:
      containers:
        - name: ce-app
          image: ghcr.io/rjullien/ce-analytics-dashboard/app
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: NODE_ENV
              value: "production"
            - name: COPILOTKIT_AGENT_URL
              value: "http://ce-agent:8123"
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
