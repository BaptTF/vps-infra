fullnameOverride: "couchdb"

clusterSize: 1
# We set this to false because we are providing the secret via Infisical
createAdminSecret: false

couchdbConfig:
  couchdb:
    uuid: "8782952b0fa1f5bb8d0aec7601b419ae" # Matches your old UUID
    max_document_size: 50000000
  chttpd:
    require_valid_user: "true"
    enable_cors: "true"
    max_http_request_size: "4294967296"
  chttpd_auth:
    require_valid_user: "true"
    # Note: 'secret' in ini is 'cookie_auth_secret' in the chart config
  cluster:
    n: 1
  httpd:
    enable_cors: "true"
    WWW-Authenticate: 'Basic realm="couchdb"'
  cors:
    origins: "app://obsidian.md,capacitor://localhost,http://localhost"
    credentials: "true"

persistentVolume:
  enabled: true
  size: 1Gi
  storageClass: "local-path"
  
resources:
  requests:
    memory: "128Mi"
    cpu: "50m"
  limits:
    memory: "512Mi"
    cpu: "500m"