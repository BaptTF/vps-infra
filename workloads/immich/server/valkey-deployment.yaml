apiVersion: apps/v1
kind: Deployment
metadata:
  name: immich-valkey
  namespace: immich
  labels:
    app: immich
    component: valkey
spec:
  revisionHistoryLimit: 2
  replicas: 1
  selector:
    matchLabels:
      app: immich
      component: valkey
  template:
    metadata:
      labels:
        app: immich
        component: valkey
    spec:
      containers:
        - name: valkey
          image: docker.io/valkey/valkey:9.1.0@sha256:8e8d64b405ce18f41b8e5ee20aa4687a8ed0022d1298f2ce31cdcf3a76e09411
          ports:
            - containerPort: 6379
              name: redis
          livenessProbe:
            exec:
              command:
                - valkey-cli
                - ping
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command:
                - valkey-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
