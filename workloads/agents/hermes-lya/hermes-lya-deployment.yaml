apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes-lya
  namespace: openclaw
  labels:
    app: hermes-lya
  annotations:
    secrets.infisical.com/auto-reload: "true"
spec:
  revisionHistoryLimit: 2
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: hermes-lya
  template:
    metadata:
      labels:
        app: hermes-lya
    spec:
      initContainers:
        - name: init-config
          image: busybox:1.36
          command: ["/bin/sh", "-c"]
          args:
            - |
              cp /config-template/config.yaml /opt/data/config.yaml
              chown -R 10000:10000 /opt/data
          volumeMounts:
            - name: config-template
              mountPath: /config-template
              readOnly: true
            - name: data
              mountPath: /opt/data
      containers:
        - name: hermes-lya
          image: nousresearch/hermes-agent:latest
          args: ["gateway", "run"]
          envFrom:
            - secretRef:
                name: hermes-lya-secret
            - secretRef:
                name: hermes-lya-secret-bifrost
          env:
            - name: API_SERVER_ENABLED
              value: "true"
            - name: API_SERVER_HOST
              value: "0.0.0.0"
            - name: API_SERVER_PORT
              value: "8642"
            - name: PATH
              value: "/opt/data/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
          ports:
            - containerPort: 8642
              name: http
              protocol: TCP
          volumeMounts:
            - name: data
              mountPath: /opt/data
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 12
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "1Gi"
              cpu: "500m"
        - name: hermes-lya-dashboard
          image: nousresearch/hermes-agent:latest
          args:
            - dashboard
            - --host
            - 0.0.0.0
            - --port
            - "9119"
            - --no-open
            - --insecure
          envFrom:
            - secretRef:
                name: hermes-lya-secret
            - secretRef:
                name: hermes-lya-secret-bifrost
          env:
            - name: PATH
              value: "/opt/data/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
          ports:
            - containerPort: 9119
              name: dashboard
              protocol: TCP
          volumeMounts:
            - name: data
              mountPath: /opt/data
          livenessProbe:
            httpGet:
              path: /api/status
              port: dashboard
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/status
              port: dashboard
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          startupProbe:
            httpGet:
              path: /api/status
              port: dashboard
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 12
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: config-template
          configMap:
            name: hermes-lya-config
        - name: data
          persistentVolumeClaim:
            claimName: hermes-lya-data
