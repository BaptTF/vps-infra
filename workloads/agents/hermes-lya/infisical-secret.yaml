  namespace: openclaw
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  hostAPI: https://app.infisical.com/api
  authentication:
    universalAuth:
      secretsScope:
        projectSlug: infrastructure
        envSlug: prod
        secretsPath: /agents/hermes-lya/bifrost
      credentialsRef:
        secretName: infisical-universal-auth
        secretNamespace: infisical
  managedKubeSecretReferences:
    - secretName: hermes-lya-secret-bifrost
      secretNamespace: openclaw
      secretType: Opaque
      creationPolicy: Owner
