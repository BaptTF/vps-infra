apiVersion: v1
kind: Service
metadata:
  name: hermes-lya
  namespace: openclaw
  labels:
    app: hermes-lya
spec:
  selector:
    app: hermes-lya
  ports:
    - protocol: TCP
      port: 8642
      targetPort: http
      name: http
    - protocol: TCP
      port: 9119
      targetPort: dashboard
      name: dashboard
