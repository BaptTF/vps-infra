apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: hermes-leo-dashboard
  namespace: openclaw
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`hermes-leo.bapttf.com`)
      kind: Rule
      middlewares:
        - name: forwardauth-authelia
          namespace: authelia
      services:
        - name: hermes-leo
          port: 9119
  tls:
    secretName: hermes-leo-dashboard-tls-certificate
