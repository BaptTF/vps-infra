model:
  provider: custom
  default: opencode-go/deepseek-v4-pro
  base_url: http://bifrost.openclaw.svc.cluster.local:8080/v1
  api_key: "dummy"
  api_mode: chat_completions

approvals:
  mode: off

terminal:
  backend: local
  timeout: 180

compression:
  enabled: true
  threshold: 0.50

memory:
  memory_enabled: true
  user_profile_enabled: true

telegram:
  require_mention: false

delegation:
  provider: custom
  model: opencode-go/glm-5.2

auxiliary:
  vision:
    provider: custom
    model: opencode-go/kimi-k2.6
    base_url: http://bifrost.openclaw.svc.cluster.local:8080/v1
    api_key: "dummy"
    api_mode: chat_completions
