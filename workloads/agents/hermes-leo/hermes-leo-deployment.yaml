apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes-leo
  namespace: openclaw
  labels:
    app: hermes-leo
  annotations:
    secrets.infisical.com/auto-reload: "true"
spec:
  revisionHistoryLimit: 2
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: hermes-leo
  template:
    metadata:
      labels:
        app: hermes-leo
    spec:
      serviceAccountName: hermes-leo
      initContainers:
        - name: init-config
          image: busybox:1.36
          command: ["/bin/sh", "-c"]
          args:
            - |
              # Copy config.yaml from ConfigMap into the PVC
              cp /config-template/config.yaml /opt/data/config.yaml

              # Setup skills directory structure for Hermes
              mkdir -p /opt/data/skills
              cd /skills-in
              for skill in *; do
                mkdir -p "/opt/data/skills/$skill"
                cp "/skills-in/$skill" "/opt/data/skills/$skill/SKILL.md"
              done

              # Ensure correct ownership (Hermes runs as UID 10000)
              chown -R 10000:10000 /opt/data/config.yaml /opt/data/skills
          volumeMounts:
            - name: config-template
              mountPath: /config-template
              readOnly: true
            - name: skills
              mountPath: /skills-in
              readOnly: true
            - name: data
              mountPath: /opt/data
      containers:
        - name: hermes-leo
          image: nousresearch/hermes-agent:latest
          args: ["gateway", "run"]
          envFrom:
            - secretRef:
                name: nullclaw-leo-secret
          env:
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: nullclaw-leo-secret-init
                  key: TELEGRAM_BOT_TOKEN
            - name: TELEGRAM_ALLOWED_USERS
              value: "974020023,8726326688,1156623391,8761164341,8348834293"
            - name: API_SERVER_ENABLED
              value: "true"
            - name: API_SERVER_HOST
              value: "0.0.0.0"
            - name: API_SERVER_PORT
              value: "8642"
            - name: API_SERVER_KEY
              valueFrom:
                secretKeyRef:
                  name: nullclaw-leo-secret
                  key: API_SERVER_KEY
            - name: NULLCLAW_WHATSMEOW_BRIDGE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: nullclaw-leo-secret-bridge
                  key: WHATSMEOW_BRIDGE_TOKEN
                  optional: true
            - name: PATH
              value: "/opt/data/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
          ports:
            - containerPort: 8642
              name: http
              protocol: TCP
          volumeMounts:
            - name: data
              mountPath: /opt/data
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 12
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "1Gi"
              cpu: "500m"
        - name: hermes-leo-dashboard
          image: nousresearch/hermes-agent:latest
          args:
            - dashboard
            - --host
            - 0.0.0.0
            - --port
            - "9119"
            - --no-open
            - --insecure
          envFrom:
            - secretRef:
                name: nullclaw-leo-secret
          env:
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: nullclaw-leo-secret-init
                  key: TELEGRAM_BOT_TOKEN
            - name: API_SERVER_KEY
              valueFrom:
                secretKeyRef:
                  name: nullclaw-leo-secret
                  key: API_SERVER_KEY
            - name: NULLCLAW_WHATSMEOW_BRIDGE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: nullclaw-leo-secret-bridge
                  key: WHATSMEOW_BRIDGE_TOKEN
                  optional: true
            - name: PATH
              value: "/opt/data/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
          ports:
            - containerPort: 9119
              name: dashboard
              protocol: TCP
          volumeMounts:
            - name: data
              mountPath: /opt/data
          livenessProbe:
            httpGet:
              path: /api/status
              port: dashboard
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/status
              port: dashboard
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          startupProbe:
            httpGet:
              path: /api/status
              port: dashboard
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 12
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: config-template
          configMap:
            name: hermes-leo-config
        - name: skills
          configMap:
            name: hermes-leo-skills
        - name: data
          persistentVolumeClaim:
            claimName: nullclaw-leo-data
