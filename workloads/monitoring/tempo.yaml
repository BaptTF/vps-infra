apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tempo
  namespace: argocd
spec:
  project: system
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: tempo
    targetRevision: 17.0.0
    helm:
      releaseName: tempo
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
