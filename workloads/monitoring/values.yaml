# kube-prometheus-stack values
# https://github.com/prometheus-community/helm-charts/tree/main/charts/kube-prometheus-stack

prometheus:
  prometheusSpec:
    retention: 15d
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          resources:
            requests:
              storage: 10Gi
    # Enable OpenTelemetry receiver
    enableRemoteWriteReceiver: true
    # OpenTelemetry configuration for Traefik
    otlpConfig:
      endpoint: "tempo:4317"

  # Prometheus service
  service:
    type: ClusterIP
    ports:
      web: 9090

  # Ingress for external access
  ingress:
    enabled: true
    ingressClassName: traefik
    annotations:
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
    hosts:
      - prometheus.bapttf.com
    tls:
      - secretName: prometheus-tls

alertmanager:
  # Disabled for simplicity - can enable later
  enabled: false

grafana:
  enabled: true
  
  # Grafana admin credentials - should use SealedSecret or external secrets
  adminPassword: admin
  
  # Grafana ingress
  ingress:
    enabled: true
    ingressClassName: traefik
    annotations:
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
    hosts:
      - grafana.bapttf.com
    tls:
      - secretName: grafana-tls
  
  # Datasources will be configured below
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: Prometheus
          type: prometheus
          access: proxy
          url: http://prometheus-server:9090
          isDefault: true
        - name: Loki
          type: loki
          access: proxy
          url: http://loki:3100
        - name: Tempo
          type: tempo
          access: proxy
          url: http://tempo:3100

  # Dashboards
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: 'default'
          orgId: 1
          folder: ''
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/default

# Node Exporter
nodeExporter:
  enabled: true

# kube-state-metrics
kubeStateMetrics:
  enabled: true

# OpenTelemetry collector - integrated with Prometheus
prometheusOperator:
  # OpenTelemetry configuration
  tls:
    enabled: false
    internalGrpcPort: 8443

# Additional scrape configs for custom exporters
additionalScrapeConfigs:
  - job_name: 'traefik'
    static_configs:
      - targets: ['traefik.kube-system.svc:8080']
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter.monitoring.svc:9100']
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['kubelet.kube-system.svc:10255']
