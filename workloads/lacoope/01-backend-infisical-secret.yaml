# LaCoope backend secrets from Infisical
# Configure in Infisical:
#   - project: lacoope
#   - environment: production
#   - secret path: /backend
#   - keys: postgres-password, session-key, admin-email, admin-password-hash, garage-access-key, garage-secret-key

apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: lacoope-backend-secrets
  namespace: default
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  hostAPI: https://app.infisical.com/api
  authentication:
    universalAuth:
      secretsScope:
        projectSlug: lacoope
        envSlug: prod
        secretsPath: /backend
      credentialsRef:
        secretName: infisical-universal-auth
        secretNamespace: infisical
  managedKubeSecretReferences:
    - secretName: lacoope-backend-secrets
      secretNamespace: default
      secretType: Opaque
      creationPolicy: Owner
