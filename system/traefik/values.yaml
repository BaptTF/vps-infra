# Traefik values for k3s
# https://github.com/traefik/traefik-helm-chart

# Namespace
namespace: traefik

# Service configuration
service:
  spec:
    type: LoadBalancer

# EntryPoints configuration
ports:
  web:
    port: 80
    expose:
      default: true
    exposedPort: 80
    transport:
      respondingTimeouts:
        readTimeout: 300s
        idleTimeout: 300s
  websecure:
    port: 443
    expose:
      default: true
    exposedPort: 443
    # Default readTimeout is 60s; raise for slow/large uploads (e.g. Immich).
    transport:
      respondingTimeouts:
        readTimeout: 300s
        idleTimeout: 300s
  ssh:
    port: 22
    expose:
      default: true
    exposedPort: 22
    protocol: TCP 

# Providers configuration
# Instructs Traefik to publish its LoadBalancer IP to standard Ingress resources.
# This ensures tools like ArgoCD can accurately read the Ingress health status.
providers:
  kubernetesIngress:
    publishedService:
      enabled: true
  kubernetesCRD:
    allowCrossNamespace: true
    allowExternalNameServices: true

# IngressClass configuration
ingressClass:
  enabled: true
  isDefaultClass: true
  name: traefik

# Dashboard disabled - use Prometheus/Grafana metrics instead
dashboard:
  enabled: false

# Logs configuration
logs:
  general:
    level: INFO
  access:
    enabled: true

# Metrics configuration
metrics:
  prometheus:
    enabled: true
    addRoutersLabels: true
    addEntryPointsLabels: true
    addServicesLabels: true
  serviceMonitor:
    enabled: true

# Security
security:
  podsAntiAffinity: true

# Resource limits
resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "256Mi"
    cpu: "500m"