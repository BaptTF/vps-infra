theme: dark

server:
  address: tcp://0.0.0.0:9091/

log:
  level: info

ntp:
  address: udp://time.cloudflare.com:123

authentication_backend:
  password_reset:
    disable: true
  ldap:
    implementation: lldap
    address: ldap://lldap.lldap.svc.cluster.local:3890
    base_dn: DC=bapttf,DC=com
    user: UID=admin,OU=people,DC=bapttf,DC=com

session:
  name: authelia_session
  same_site: lax
  expiration: 7d
  inactivity: 3d
  remember_me: 1M
  cookies:
    - domain: bapttf.com
      authelia_url: https://auth.bapttf.com
      default_redirection_url: https://tripkit.bapttf.com

storage:
  postgres:
    address: tcp://postgres-cluster-rw.cnpg-system.svc.cluster.local:5432
    database: authelia
    schema: public
    username: authelia
    tls:
      skip_verify: true

notifier:
  filesystem:
    filename: /tmp/notification.txt

access_control:
  default_policy: deny
  rules:
    - domain: tripkit.bapttf.com
      policy: one_factor
      subject: "group:family"
    - domain: drive.bapttf.com
      policy: one_factor
      subject: "group:family"
    - domain: lya-drive.bapttf.com
      policy: one_factor
      subject: "group:family"
    - domain: ce-analytics.bapttf.com
      policy: one_factor
      subject: "group:nice"
    - domain: hermes-*.bapttf.com
      policy: one_factor
      subject: "group:family"
    - domain: "*.bapttf.com"
      policy: one_factor
      subject: "group:lldap_admin"

totp:
  issuer: juju.bapttf.com
  period: 30

webauthn:
  display_name: Famille Juju

identity_providers:
  oidc:
    hmac_secret: '{{ secret "/config/secrets/oidc-hmac-secret" }}'
    jwks:
      - key_id: main
        algorithm: RS256
        use: sig
        key: {{ secret "/config/secrets/oidc-jwks-private-key" | mindent 10 "|" | msquote }}
    authorization_policies:
      family_only:
        default_policy: deny
        rules:
          - policy: one_factor
            subject: "group:family"
    clients:
      - client_id: hermes-leo-dashboard
        client_name: Hermes Leo Dashboard
        public: true
        authorization_policy: family_only
        consent_mode: pre-configured
        pre_configured_consent_duration: 1y
        require_pkce: true
        pkce_challenge_method: S256
        redirect_uris:
          - https://hermes-leo.bapttf.com/auth/callback
        scopes:
          - openid
          - profile
          - email
        response_types:
          - code
        grant_types:
          - authorization_code
        access_token_signed_response_alg: none
        userinfo_signed_response_alg: none
        token_endpoint_auth_method: none
      - client_id: hermes-lya-dashboard
        client_name: Hermes Lya Dashboard
        public: true
        authorization_policy: family_only
        consent_mode: pre-configured
        pre_configured_consent_duration: 1y
        require_pkce: true
        pkce_challenge_method: S256
        redirect_uris:
          - https://hermes-lya.bapttf.com/auth/callback
        scopes:
          - openid
          - profile
          - email
        response_types:
          - code
        grant_types:
          - authorization_code
        access_token_signed_response_alg: none
        userinfo_signed_response_alg: none
        token_endpoint_auth_method: none
      - client_id: immich
        client_name: Immich
        client_secret: '{{ secret "/config/secrets/immich-oidc-client-secret-hash" }}'
        public: false
        authorization_policy: family_only
        consent_mode: pre-configured
        pre_configured_consent_duration: 1y
        require_pkce: false
        pkce_challenge_method: ''
        redirect_uris:
          - https://immich.bapttf.com/auth/login
          - https://immich.bapttf.com/user-settings
          - app.immich:///oauth-callback
        scopes:
          - openid
          - profile
          - email
        response_types:
          - code
        grant_types:
          - authorization_code
        access_token_signed_response_alg: none
        userinfo_signed_response_alg: none
        token_endpoint_auth_method: client_secret_post
