# system/argocd-image-updater/base/kustomization.yaml
# ArgoCD Image Updater controller and infrastructure
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: argocd

resources:
  # Install ArgoCD Image Updater from official manifests (stable version)
  - https://raw.githubusercontent.com/argoproj-labs/argocd-image-updater/stable/config/install.yaml
  # Git credentials for write-back
  - infisical-secret.yaml

patches:
  - target:
      kind: Deployment
      name: argocd-image-updater
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 500m
            memory: 256Mi
