apiVersion: argocd-image-updater.argoproj.io/v1alpha1
kind: ImageUpdater
metadata:
  name: bifrost-updater
  namespace: argocd
spec:
  applicationRefs:
    - namePattern: agents
      images:
        - alias: bifrost
          imageName: "maximhq/bifrost:v1.x"
          commonUpdateSettings:
            updateStrategy: semver
            allowTags: "regexp:^v[0-9]+\\.[0-9]+\\.[0-9]+$"
  writeBackConfig:
    method: "git:secret:argocd/argocd-image-updater-git-creds"
    gitConfig:
      branch: "main"
      pullRequest:
        github: {}
