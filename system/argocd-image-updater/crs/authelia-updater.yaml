apiVersion: argocd-image-updater.argoproj.io/v1alpha1
kind: ImageUpdater
metadata:
  name: authelia-updater
  namespace: argocd
spec:
  applicationRefs:
    - namePattern: authelia
      images:
        - alias: authelia
          imageName: "authelia/authelia:4.x"
          commonUpdateSettings:
            updateStrategy: semver
            allowTags: "regexp:^[0-9]+\\.[0-9]+\\.[0-9]+$"
  writeBackConfig:
    method: "git:secret:argocd/argocd-image-updater-git-creds"
    gitConfig:
      branch: "main"
      pullRequest:
        github: {}
