apiVersion: argocd-image-updater.argoproj.io/v1alpha1
kind: ImageUpdater
metadata:
  name: openwebui-updater
  namespace: argocd
spec:
  applicationRefs:
    - namePattern: openwebui-workload
      images:
        - alias: openwebui
          imageName: "ghcr.io/open-webui/open-webui:v0.x"
          commonUpdateSettings:
            updateStrategy: semver
            allowTags: "regexp:^v[0-9]+\\.[0-9]+\\.[0-9]+$"
  writeBackConfig:
    method: "git:secret:argocd/argocd-image-updater-git-creds"
    gitConfig:
      branch: "main"
      pullRequest:
        github: {}
