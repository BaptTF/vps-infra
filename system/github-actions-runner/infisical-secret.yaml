# Infisical → Kubernetes secret sync for GitHub PAT
# Creates K8s secret 'github-runner-pat' in arc-runners namespace
#
# ARC expects the secret to have a key named exactly 'github_token' (lowercase!)
#
# Setup in Infisical:
# 1. Create a GitHub PAT (classic) at https://github.com/settings/tokens
#    - For repo-level runners: scope 'repo'
#    - For org-level runners: scope 'admin:org'
# 2. In Infisical project 'infrastructure', env 'prod', path '/github-actions-runner':
#    Create a secret with key: github_token  value: ghp_xxxYourPATxxx
#    (must be lowercase 'github_token' — this is what ARC looks up in the K8s secret)
apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: github-runner-secrets-sync
  namespace: arc-runners
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  hostAPI: https://app.infisical.com/api
  resyncInterval: 300
  authentication:
    universalAuth:
      secretsScope:
        projectSlug: infrastructure
        envSlug: prod
        secretsPath: /github-actions-runner
      credentialsRef:
        secretName: infisical-universal-auth
        secretNamespace: infisical
  managedKubeSecretReferences:
    - secretName: github-runner-pat
      secretNamespace: arc-runners
      secretType: Opaque
      creationPolicy: Owner
