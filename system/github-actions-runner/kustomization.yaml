# GitHub Actions Runner - Kustomize manifests
# Controller: deployed via ArgoCD Helm source (apps/arc-controller.yaml)
# Runner Set: pure YAML AutoscalingRunnerSet (no Helm needed)
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: arc-runners

resources:
  - namespace.yaml
  - infisical-secret.yaml
  - runner-set.yaml
