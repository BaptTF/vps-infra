# AutoscalingRunnerSet - pure YAML, managed by Kustomize
# Ref: https://dev.to/ngapaillard/github-actions-runner-controller-arc-v2-how-to-be-synced-with-argocd-1ppo
# Usage in workflows: runs-on: arc-runner-set
apiVersion: actions.github.com/v1alpha1
kind: AutoscalingRunnerSet
metadata:
  name: arc-runner-set
  namespace: arc-runners
  labels:
    # CRITICAL: must match controller version or controller deletes the resource
    app.kubernetes.io/version: "0.14.1"
    app.kubernetes.io/name: arc-runner-set
    app.kubernetes.io/component: autoscaling-runner-set
    app.kubernetes.io/part-of: github-actions-runner
spec:
  githubConfigUrl: "https://github.com/rjullien/ce-analytics-dashboard"
  githubConfigSecret: github-runner-pat
  runnerScaleSetName: "arc-runner-set"
  minRunners: 0
  maxRunners: 3
  template:
    spec:
      containers:
        - name: runner
          image: ghcr.io/actions/actions-runner:latest
          command: ["/home/runner/run.sh"]
          env:
            - name: DOCKER_HOST
              value: tcp://localhost:2376
            - name: DOCKER_TLS_VERIFY
              value: "1"
            - name: DOCKER_CERT_PATH
              value: /certs/client
          volumeMounts:
            - name: docker-certs
              mountPath: /certs/client
              readOnly: true
            - name: work
              mountPath: /home/runner/_work
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
        # Docker-in-Docker sidecar
        - name: dind
          image: docker:27-dind
          securityContext:
            privileged: true
          env:
            - name: DOCKER_TLS_CERTDIR
              value: /certs
          volumeMounts:
            - name: docker-certs
              mountPath: /certs/client
            - name: docker-storage
              mountPath: /var/lib/docker
            - name: work
              mountPath: /home/runner/_work
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
      volumes:
        - name: docker-certs
          emptyDir: {}
        - name: docker-storage
          emptyDir: {}
        - name: work
          emptyDir: {}
