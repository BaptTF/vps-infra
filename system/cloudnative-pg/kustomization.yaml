apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: cnpg-system

helmCharts:
  - name: cloudnative-pg
    repo: https://cloudnative-pg.github.io/charts
    version: 0.27.0
    releaseName: cnpg
    namespace: cnpg-system
    valuesInline:
      resources:
        requests:
          cpu: 10m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 128Mi

resources:
  - cluster.yaml
  - databases.yaml
  - database-infisical-secrets.yaml
  - backup-infisical-secret.yaml
  - scheduled-backup.yaml
