apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Dynamically pull and render the MinIO Helm Chart
helmCharts:
  - name: minio
    repo: https://charts.min.io/
    version: 5.4.0 # Reliable recent version
    namespace: minio
    releaseName: minio
    valuesFile: values.yaml

patches:
  - target:
      kind: Deployment
      name: minio
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 0

resources:
  - traefik-ingress.yaml
  - certificate.yaml
  - infisical-secret.yaml
  - tailscale-ingress.yaml