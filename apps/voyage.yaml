apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: voyage
  namespace: argocd
  annotations:
    # ArgoCD Image Updater — auto-update voyage-app image on new push
    argocd-image-updater.argoproj.io/image-list: voyage-app=ghcr.io/rjullien/voyage-app
    argocd-image-updater.argoproj.io/voyage-app.update-strategy: digest
    argocd-image-updater.argoproj.io/voyage-app.allow-tags: regexp:^(latest|sha-.+)$
    argocd-image-updater.argoproj.io/write-back-method: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/BaptTF/vps-infra.git'
    targetRevision: HEAD
    path: workloads/voyage
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: voyage
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
