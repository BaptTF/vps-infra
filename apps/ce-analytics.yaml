apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ce-analytics
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/manifest-generate-paths: .
spec:
  project: default
  source:
    repoURL: 'https://github.com/BaptTF/vps-infra.git'
    targetRevision: HEAD
    path: workloads/ce-analytics
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: ce-analytics
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
