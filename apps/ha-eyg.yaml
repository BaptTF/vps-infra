apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ha-eyg
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/manifest-generate-paths: .
spec:
  project: default
  source:
    repoURL: 'https://github.com/BaptTF/vps-infra.git'
    targetRevision: HEAD
    path: workloads/ha-eyg
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: ha-eyg
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  ignoreDifferences:
    - group: ""
      kind: Service
      name: ha-eyg
      namespace: ha-eyg
      jsonPointers:
      - /spec/externalName
